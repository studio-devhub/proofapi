name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /home/${{ secrets.EC2_USER }}/proofapi

            echo "Pulling latest code..."
            git pull origin main

            echo "Removing any orphan containers..."
            docker rm -f lt-engine lt-redis lt-api lt-nginx 2>/dev/null || true

            echo "Clearing Docker build cache and dangling images..."
            docker builder prune -af
            docker image prune -f

            echo "Rebuilding and restarting all services..."
            docker compose --profile production up -d --build --remove-orphans

            echo "Waiting for API to be healthy (up to 120s)..."
            for i in $(seq 1 24); do
              curl -sf http://localhost:4003/v1/health | grep -q '"api":"ok"' && echo "Deploy successful." && exit 0
              echo "  waiting... ($i/24)"
              sleep 5
            done

            echo "Health check failed after 120s"
            docker compose logs --tail 20
            exit 1
